      <animateTransform attributeName="transform" type="translate" values="-376 82; 468 82" dur="8.2s" repeatCount="indefinite"/>
      <use href="#chicken"/>
      <animate attributeName="opacity" values="1;1;0;1" keyTimes="0;0.48;0.56;1" dur="8.2s" begin="3s" repeatCount="indefinite"/>
      <g transform="translate(10 8)" opacity="0">
        <use href="#boom"/>
        <animate attributeName="opacity" values="0;0;1;0;0" keyTimes="0;0.5;0.54;0.6;1" dur="8.2s" begin="3s" repeatCount="indefinite"/>
      </g>
