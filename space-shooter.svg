  <g transform="translate(-20 166)">
    <animateTransform attributeName="transform" type="translate" values="-20 166; 700 166; -20 166" dur="6.5s" repeatCount="indefinite"/>
    <use href="#ship"/>
    <rect x="13" y="-18" width="2" height="16" fill="#7ee787">
      <animate attributeName="opacity" values="0;1;0" dur="0.7s" repeatCount="indefinite"/>
    </rect>
    <rect x="12" y="-36" width="4" height="18" fill="#00c2ff">
      <animate attributeName="opacity" values="0;1;0" dur="0.7s" repeatCount="indefinite"/>
    </rect>
    <rect x="13" y="-54" width="2" height="14" fill="#ffffff">
      <animate attributeName="opacity" values="0;1;0" dur="0.7s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
