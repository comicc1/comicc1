    <rect x="88" y="44" width="2" height="2" fill="#7ee787"><animate attributeName="opacity" values="0.15;1;0.15" dur="3.2s" repeatCount="indefinite"/></rect>
    <rect x="150" y="18" width="2" height="2" fill="#e6edf3"><animate attributeName="opacity" values="0.15;1;0.15" dur="2.9s" repeatCount="indefinite"/></rect>
    <rect x="214" y="60" width="2" height="2" fill="#ff6b6b"><animate attributeName="opacity" values="0.15;1;0.15" dur="2.7s" repeatCount="indefinite"/></rect>
    <rect x="286" y="26" width="2" height="2" fill="#00c2ff"><animate attributeName="opacity" values="0.15;1;0.15" dur="3.5s" repeatCount="indefinite"/></rect>
    <rect x="362" y="48" width="2" height="2" fill="#e6edf3"><animate attributeName="opacity" values="0.15;1;0.15" dur="2.1s" repeatCount="indefinite"/></rect>
    <rect x="438" y="22" width="2" height="2" fill="#7ee787"><animate attributeName="opacity" values="0.15;1;0.15" dur="3.7s" repeatCount="indefinite"/></rect>
    <rect x="506" y="52" width="2" height="2" fill="#e6edf3"><animate attributeName="opacity" values="0.15;1;0.15" dur="2.8s" repeatCount="indefinite"/></rect>
    <rect x="578" y="34" width="2" height="2" fill="#ff6b6b"><animate attributeName="opacity" values="0.15;1;0.15" dur="3.1s" repeatCount="indefinite"/></rect>
    <rect x="652" y="58" width="2" height="2" fill="#e6edf3"><animate attributeName="opacity" values="0.15;1;0.15" dur="2.6s" repeatCount="indefinite"/></rect>
    <rect x="720" y="24" width="2" height="2" fill="#7ee787"><animate attributeName="opacity" values="0.15;1;0.15" dur="2.3s" repeatCount="indefinite"/></rect>
  </g>

  <rect x="0" y="156" width="760" height="2" fill="#273040"/>
  <rect x="0" y="158" width="760" height="1" fill="#7ee787" opacity="0.12"/>

  <text x="380" y="24" text-anchor="middle" fill="#7ee787" font-family="monospace" font-size="14" font-weight="700">PIXEL SPACE SHOOTER</text>

  <g transform="translate(0 0)">
    <g transform="translate(-44 40)">
      <animateTransform attributeName="transform" type="translate" values="-44 40; 800 40" dur="7.5s" repeatCount="indefinite"/>
      <use href="#chicken"/>
      <animate attributeName="opacity" values="1;1;0;1" keyTimes="0;0.44;0.52;1" dur="7.5s" begin="0s" repeatCount="indefinite"/>
      <g transform="translate(10 8)" opacity="0">
        <use href="#boom"/>
        <animate attributeName="opacity" values="0;0;1;0;0" keyTimes="0;0.46;0.5;0.56;1" dur="7.5s" begin="0s" repeatCount="indefinite"/>
      </g>
    </g>

    <g transform="translate(-168 40)">
      <animateTransform attributeName="transform" type="translate" values="-168 40; 676 40" dur="7.5s" repeatCount="indefinite"/>
      <use href="#chicken"/>
      <animate attributeName="opacity" values="1;1;0;1" keyTimes="0;0.49;0.57;1" dur="7.5s" begin="1.2s" repeatCount="indefinite"/>
      <g transform="translate(10 8)" opacity="0">
        <use href="#boom"/>
        <animate attributeName="opacity" values="0;0;1;0;0" keyTimes="0;0.51;0.55;0.61;1" dur="7.5s" begin="1.2s" repeatCount="indefinite"/>
      </g>
    </g>

    <g transform="translate(-292 40)">
