      <use href="#chicken"/>
      <animate attributeName="opacity" values="1;1;0;1" keyTimes="0;0.5;0.58;1" dur="8.2s" begin="0.6s" repeatCount="indefinite"/>
      <g transform="translate(10 8)" opacity="0">
        <use href="#boom"/>
        <animate attributeName="opacity" values="0;0;1;0;0" keyTimes="0;0.52;0.56;0.62;1" dur="8.2s" begin="0.6s" repeatCount="indefinite"/>
      </g>
    </g>

    <g transform="translate(-228 82)">
      <animateTransform attributeName="transform" type="translate" values="-228 82; 616 82" dur="8.2s" repeatCount="indefinite"/>
      <use href="#chicken"/>
      <animate attributeName="opacity" values="1;1;0;1" keyTimes="0;0.43;0.51;1" dur="8.2s" begin="1.8s" repeatCount="indefinite"/>
      <g transform="translate(10 8)" opacity="0">
        <use href="#boom"/>
        <animate attributeName="opacity" values="0;0;1;0;0" keyTimes="0;0.45;0.49;0.55;1" dur="8.2s" begin="1.8s" repeatCount="indefinite"/>
      </g>
    </g>

