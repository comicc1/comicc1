      <use href="#chicken"/>
      <animate attributeName="opacity" values="1;1;0;1" keyTimes="0;0.42;0.5;1" dur="7.5s" begin="2.4s" repeatCount="indefinite"/>
      <g transform="translate(10 8)" opacity="0">
        <use href="#boom"/>
        <animate attributeName="opacity" values="0;0;1;0;0" keyTimes="0;0.44;0.48;0.54;1" dur="7.5s" begin="2.4s" repeatCount="indefinite"/>
      </g>
    </g>

    <g transform="translate(-416 40)">
      <animateTransform attributeName="transform" type="translate" values="-416 40; 428 40" dur="7.5s" repeatCount="indefinite"/>
      <use href="#chicken"/>
      <animate attributeName="opacity" values="1;1;0;1" keyTimes="0;0.46;0.54;1" dur="7.5s" begin="3.6s" repeatCount="indefinite"/>
      <g transform="translate(10 8)" opacity="0">
        <use href="#boom"/>
        <animate attributeName="opacity" values="0;0;1;0;0" keyTimes="0;0.48;0.52;0.58;1" dur="7.5s" begin="3.6s" repeatCount="indefinite"/>
      </g>
    </g>

