<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 220" role="img" aria-labelledby="title desc" shape-rendering="crispEdges">
  <title id="title">Pixel Space Shooter</title>
  <desc id="desc">A pixelated space shooter scene with chickens moving left to right and getting blasted in a loop.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#070a10"/>
      <stop offset="100%" stop-color="#101722"/>
    </linearGradient>

    <g id="chicken">
      <rect x="8" y="0" width="4" height="4" fill="#ff5d73"/>
      <rect x="12" y="0" width="4" height="4" fill="#ff5d73"/>
      <rect x="4" y="4" width="4" height="4" fill="#ff5d73"/>
      <rect x="8" y="4" width="4" height="4" fill="#ffd54a"/>
      <rect x="12" y="4" width="4" height="4" fill="#ffd54a"/>
      <rect x="16" y="4" width="4" height="4" fill="#ff9f1c"/>
      <rect x="20" y="4" width="4" height="4" fill="#ff5d73"/>
      <rect x="0" y="8" width="4" height="4" fill="#ffd54a"/>
      <rect x="4" y="8" width="4" height="4" fill="#ffd54a"/>
      <rect x="8" y="8" width="4" height="4" fill="#ffd54a"/>
      <rect x="12" y="8" width="4" height="4" fill="#ffd54a"/>
      <rect x="16" y="8" width="4" height="4" fill="#ffd54a"/>
      <rect x="20" y="8" width="4" height="4" fill="#ffd54a"/>
      <rect x="24" y="8" width="4" height="4" fill="#ffd54a"/>
      <rect x="0" y="12" width="4" height="4" fill="#ffd54a"/>
      <rect x="4" y="12" width="4" height="4" fill="#0b0f16"/>
      <rect x="8" y="12" width="4" height="4" fill="#ffd54a"/>
      <rect x="12" y="12" width="4" height="4" fill="#ffd54a"/>
      <rect x="16" y="12" width="4" height="4" fill="#0b0f16"/>
      <rect x="20" y="12" width="4" height="4" fill="#ffd54a"/>
      <rect x="24" y="12" width="4" height="4" fill="#ffd54a"/>
      <rect x="0" y="16" width="4" height="4" fill="#ffd54a"/>
      <rect x="4" y="16" width="4" height="4" fill="#ffd54a"/>
      <rect x="8" y="16" width="4" height="4" fill="#ffd54a"/>
      <rect x="12" y="16" width="4" height="4" fill="#ffd54a"/>
      <rect x="16" y="16" width="4" height="4" fill="#ffd54a"/>
      <rect x="20" y="16" width="4" height="4" fill="#ffd54a"/>
      <rect x="24" y="16" width="4" height="4" fill="#ffd54a"/>
      <rect x="4" y="20" width="4" height="4" fill="#ff9f1c"/>
      <rect x="20" y="20" width="4" height="4" fill="#ff9f1c"/>
    </g>

    <g id="ship">
      <rect x="10" y="0" width="8" height="4" fill="#dce4ef"/>
      <rect x="6" y="4" width="16" height="4" fill="#dce4ef"/>
      <rect x="2" y="8" width="24" height="4" fill="#aab4c2"/>
      <rect x="0" y="12" width="28" height="4" fill="#7b8797"/>
      <rect x="4" y="16" width="20" height="4" fill="#dce4ef"/>
      <rect x="10" y="20" width="8" height="4" fill="#00c2ff"/>
      <rect x="12" y="24" width="4" height="4" fill="#7ee787"/>
    </g>

    <g id="boom">
      <rect x="8" y="4" width="4" height="4" fill="#ffd166"/>
      <rect x="4" y="8" width="4" height="4" fill="#ff9f1c"/>
      <rect x="8" y="8" width="4" height="4" fill="#ff6b6b"/>
      <rect x="12" y="8" width="4" height="4" fill="#ff9f1c"/>
      <rect x="0" y="12" width="4" height="4" fill="#ff6b6b"/>
      <rect x="4" y="12" width="4" height="4" fill="#ffd166"/>
      <rect x="8" y="12" width="4" height="4" fill="#ffffff"/>
      <rect x="12" y="12" width="4" height="4" fill="#ffd166"/>
      <rect x="16" y="12" width="4" height="4" fill="#ff6b6b"/>
      <rect x="4" y="16" width="4" height="4" fill="#ff9f1c"/>
      <rect x="8" y="16" width="4" height="4" fill="#ff6b6b"/>
      <rect x="12" y="16" width="4" height="4" fill="#ff9f1c"/>
      <rect x="8" y="20" width="4" height="4" fill="#ffd166"/>
